<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Loading</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0f1117;
            color:#e4e6f0;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            user-select:none;
        }

        .logo {
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;
            transition:transform 0.2s,box-shadow 0.2s;
            margin-bottom:32px;
        }
        .logo:hover { transform:scale(1.05); }
        .logo:active { transform:scale(0.97); }
        .logo-fallback {
            width:160px;height:160px;
            background:linear-gradient(135deg,#5b6abf,#7c3aed);
            border-radius:36px;
            display:flex;align-items:center;justify-content:center;
            font-size:72px;font-weight:700;color:#fff;
            box-shadow:0 8px 32px rgba(91,106,191,0.4);
        }
        .logo-img {
            max-width:280px;max-height:220px;
            width:auto;height:auto;
            object-fit:contain;
        }

        .status {
            text-align:center;
            min-height:80px;
        }
        .status-text {
            font-size:18px;
            color:#8b8fa8;
            margin-bottom:8px;
        }
        .status-detail {
            font-size:14px;
            color:#5a5e76;
        }
        .status-error {
            color:#f87171;
            font-size:16px;
            font-weight:600;
        }
        .status-ok { color:#22c55e; }

        .countdown-bar {
            position:fixed;
            top:0;left:0;
            height:4px;
            background:linear-gradient(90deg,#5b6abf,#22c55e);
            transition:width 1s linear;
            z-index:100;
            width:0;
        }

        .netinfo {
            position:fixed;
            bottom:16px;right:24px;
            text-align:right;
            font-size:12px;
            color:#5a5e76;
            line-height:1.8;
            font-family:'Courier New',monospace;
        }
        .netinfo .label { color:#8b8fa8; font-weight:600; }

        .tap-hint {
            position:fixed;
            bottom:16px;left:24px;
            font-size:11px;
            color:#3a3d50;
            transition:opacity 0.3s;
        }

        .retry-countdown {
            display:inline-block;
            min-width:18px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="countdown-bar" id="countdown-bar"></div>

    <div class="logo" id="logo" title="Tap to open admin panel"><div class="logo-fallback" id="logo-fallback">K</div></div>

    <div class="status" id="status">
        <div class="status-text">Starting up...</div>
    </div>

    <div class="netinfo" id="netinfo">
        <div><span class="label">IP:</span> Loading...</div>
    </div>

    <div class="tap-hint" id="tap-hint">Tap logo to access admin panel</div>

    <script>
    (function() {
        const LOGO_WAIT = 5;
        const RETRY_INTERVAL = 5;
        let stopped = false;  // once true, no more navigation or timer callbacks
        let phase = 'logo';  // 'logo' → 'checking' → 'connected' | 'error'

        const statusEl = document.getElementById('status');
        const barEl = document.getElementById('countdown-bar');
        const netinfoEl = document.getElementById('netinfo');
        const logoEl = document.getElementById('logo');
        const hintEl = document.getElementById('tap-hint');

        function navigate(url) {
            if (stopped) return;
            stopped = true;
            window.location.replace(url);
        }

        // --- Logo tap → admin login ---
        function onLogoTap(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            navigate('/login');
        }
        logoEl.addEventListener('click', onLogoTap);
        logoEl.addEventListener('touchend', onLogoTap);

        // --- Load network info ---
        function loadNetInfo() {
            fetch('/kiosk/api/netinfo')
                .then(r => r.json())
                .then(data => {
                    let html = '';
                    if (data.ip) html += '<div><span class="label">IP:</span> ' + data.ip + '</div>';
                    else html += '<div><span class="label">IP:</span> Not assigned</div>';
                    if (data.subnet) html += '<div><span class="label">Subnet:</span> ' + data.subnet + '</div>';
                    if (data.gateway) html += '<div><span class="label">Gateway:</span> ' + data.gateway + '</div>';
                    if (data.dns) html += '<div><span class="label">DNS:</span> ' + data.dns + '</div>';
                    netinfoEl.innerHTML = html || '<div>No network</div>';
                })
                .catch(() => {
                    netinfoEl.innerHTML = '<div>Network info unavailable</div>';
                });
        }

        // --- Phase 1: Logo countdown (5 seconds) ---
        function startLogoCountdown() {
            phase = 'logo';
            let remaining = LOGO_WAIT;
            barEl.style.transition = 'none';
            barEl.style.width = '100%';

            statusEl.innerHTML =
                '<div class="status-text">Tap logo to open admin panel</div>' +
                '<div class="status-detail">Checking target URL in <span id="logo-cd">' + remaining + '</span>s...</div>';

            const interval = setInterval(function() {
                if (stopped) { clearInterval(interval); return; }
                remaining--;
                const cdEl = document.getElementById('logo-cd');
                if (cdEl) cdEl.textContent = remaining;
                barEl.style.transition = 'width 1s linear';
                barEl.style.width = ((remaining / LOGO_WAIT) * 100) + '%';

                if (remaining <= 0) {
                    clearInterval(interval);
                    if (!stopped) {
                        hintEl.style.opacity = '0';
                        startUrlCheck();
                    }
                }
            }, 1000);
        }

        // --- Phase 2: Check URL reachability ---
        function startUrlCheck() {
            if (stopped) return;
            phase = 'checking';
            statusEl.innerHTML = '<div class="status-text">Checking connection...</div>';
            barEl.style.transition = 'none';
            barEl.style.width = '0';

            fetch('/kiosk/api/check-url')
                .then(r => r.json())
                .then(data => {
                    if (stopped) return;
                    if (data.reachable) {
                        phase = 'connected';
                        statusEl.innerHTML =
                            '<div class="status-text status-ok">Connected</div>' +
                            '<div class="status-detail">Redirecting to ' + escapeHtml(data.url) + '</div>';
                        barEl.style.width = '100%';
                        navigate(data.url);
                    } else {
                        showError(data);
                    }
                })
                .catch(() => {
                    if (stopped) return;
                    showError({url: '', error: 'Service not ready'});
                });
        }

        // --- Phase 3: Error → retry with countdown ---
        function showError(data) {
            if (stopped) return;
            phase = 'error';
            let remaining = RETRY_INTERVAL;

            statusEl.innerHTML =
                '<div class="status-error">' + escapeHtml(data.error || 'Connection failed') + '</div>' +
                (data.url ? '<div class="status-detail" style="margin-top:8px;">Target: ' + escapeHtml(data.url) + '</div>' : '') +
                '<div class="status-detail" style="margin-top:12px;">Retrying in <span class="retry-countdown" id="retry-cd">' + remaining + '</span>s...</div>';

            barEl.style.transition = 'none';
            barEl.style.width = '100%';

            const interval = setInterval(function() {
                if (stopped) { clearInterval(interval); return; }
                remaining--;
                var cdEl = document.getElementById('retry-cd');
                if (cdEl) cdEl.textContent = remaining;
                barEl.style.transition = 'width 1s linear';
                barEl.style.width = ((remaining / RETRY_INTERVAL) * 100) + '%';

                if (remaining <= 0) {
                    clearInterval(interval);
                    startUrlCheck();
                }
            }, 1000);
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // --- Load custom logo ---
        function loadLogo() {
            var img = new Image();
            img.onload = function() {
                var el = document.getElementById('logo');
                var fallback = document.getElementById('logo-fallback');
                if (fallback) fallback.style.display = 'none';
                img.className = 'logo-img';
                el.insertBefore(img, el.firstChild);
            };
            img.src = '/settings/api/logo?t=' + Date.now();
        }

        // --- W/Q cursor shortcuts ---
        document.addEventListener('keydown', function(e) {
            if (e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                fetch('/kiosk/api/cursor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ show: true })
                }).then(function() {
                    statusEl.innerHTML = '<div class="status-text status-ok">Cursor enabled — restarting...</div>';
                    return fetch('/kiosk/api/restart', { method: 'POST' });
                }).catch(function() {});
                return;
            }
            if (e.key === 'q' || e.key === 'Q') {
                e.preventDefault();
                fetch('/kiosk/api/cursor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ show: false })
                }).then(function() {
                    statusEl.innerHTML = '<div class="status-text">Cursor hidden — restarting...</div>';
                    return fetch('/kiosk/api/restart', { method: 'POST' });
                }).catch(function() {});
                return;
            }
        });

        // --- Init ---
        loadLogo();
        loadNetInfo();
        startLogoCountdown();
    })();
    </script>
</body>
</html>
