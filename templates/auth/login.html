<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kiosk Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ app_version }}">
    <style>
        .mode-toast {
            position:fixed;top:24px;left:50%;transform:translateX(-50%);
            padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;
            color:#fff;z-index:9999;opacity:0;transition:opacity 0.3s;
            pointer-events:none;
        }
        .mode-toast.show { opacity:1; }
        .mode-toast.cursor { background:#22c55e; }
        .mode-toast.touch { background:#3b82f6; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="sidebar-logo" style="margin:0 auto 16px;width:48px;height:48px;font-size:22px;">K</div>
            <h1>Kiosk Manager</h1>
            <p>Enter your PIN to access the dashboard</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div style="color:var(--danger);margin-bottom:16px;font-size:13px;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="form-group">
                    <input type="password" name="pin" class="form-input pin-input" placeholder="PIN" maxlength="10" autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Unlock</button>
            </form>
        </div>
    </div>
    <div class="mode-toast" id="mode-toast"></div>
    <script>
    (function() {
        const toast = document.getElementById('mode-toast');
        let toastTimer = null;

        function showToast(msg, cls) {
            toast.textContent = msg;
            toast.className = 'mode-toast ' + cls + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        // No Chrome restart: hide_cursor.py toggles the cursor display-wide via
        // XFixes and takes effect immediately. Restarting here used to kill
        // Chrome and bounce the screen back to the loading page — so a PIN
        // containing 'w' or 'q' made login impossible from the kiosk itself.
        function setCursor(show) {
            fetch('/kiosk/api/cursor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ show: show })
            }).catch(() => {});
        }

        document.addEventListener('keydown', function(e) {
            const pinInput = document.querySelector('.pin-input');
            const isFocused = document.activeElement === pinInput;

            if (e.key === 'w' || e.key === 'W') {
                if (isFocused) { pinInput.blur(); }
                e.preventDefault();
                setCursor(true);
                showToast('Cursor Mode — cursor visible', 'cursor');
                return;
            }
            if (e.key === 'q' || e.key === 'Q') {
                if (isFocused) { pinInput.blur(); }
                e.preventDefault();
                setCursor(false);
                showToast('Touchscreen Mode — cursor hidden', 'touch');
                return;
            }

            // Any other key: focus the PIN input so they can type
            if (!isFocused && e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                pinInput.focus();
            }
        });
    })();
    </script>
    {% if keyboard_enabled %}
    <script src="{{ url_for('static', filename='js/keyboard.js') }}?v={{ app_version }}"></script>
    {% endif %}
</body>
</html>
